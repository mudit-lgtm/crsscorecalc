name: Update Domain Artifacts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-domain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Show files for debugging
        run: |
          echo "=== Root files ==="
          ls -la
          echo ""
          echo "=== HTML/XML/JSON files found ==="
          find . -type f \( -name "*.html" -o -name "*.htm" -o -name "*.xml" -o -name "robots.txt" -o -name "*.json" -o -name "*.js" -o -name "*.jsx" -o -name "*.ts" -o -name "*.tsx" -o -name "*.md" \) \
            -not -path "./.git/*" -not -path "./node_modules/*" | sort

      - name: Dry run domain update
        run: python update-domain-artifacts.py --dry-run

      - name: Apply domain update
        run: python update-domain-artifacts.py

      - name: Show git diff summary
        run: git diff --stat || echo "No changes"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update domain artifacts to custom domain"
          git push
